name: Build & Test

on:
  push:
    branches: [ '**', '!main' ]
    paths:
      - 'LiteBus.slnx'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'LiteBus.slnx'
      - 'src/**'
      - 'tests/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Important for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dependencies
        run: dotnet restore LiteBus.slnx

      - name: Decode Strong Name Key
        run: echo "${{ secrets.STRONG_NAME_KEY }}" | base64 --decode > LiteBus.snk

      - name: Build
        run: dotnet build LiteBus.slnx --configuration Release --no-restore

      - name: Check Docker availability
        id: docker
        run: |
          if docker info >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Docker is available; integration tests will run."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Docker is not available; integration tests will be skipped."
          fi
        continue-on-error: true

      - name: Unit Tests
        run: dotnet test LiteBus.slnx --no-restore --verbosity normal --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~IntegrationTests"

      - name: Integration Tests
        if: steps.docker.outputs.available == 'true'
        run: dotnet test LiteBus.slnx --no-restore --verbosity normal --collect:"XPlat Code Coverage" --filter "FullyQualifiedName~IntegrationTests"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/**/*.xml'

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
