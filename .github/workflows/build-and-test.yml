name: Build & Test

on:
  push:
    branches: [ '**', '!main' ]
    paths:
      - 'LiteBus.slnx'
      - 'src/**'
      - 'tests/**'
      - 'benchmarks/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'LiteBus.slnx'
      - 'src/**'
      - 'tests/**'
      - 'benchmarks/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Important for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dependencies
        run: dotnet restore LiteBus.slnx

      - name: Decode Strong Name Key
        run: echo "${{ secrets.STRONG_NAME_KEY }}" | base64 --decode > LiteBus.snk

      - name: Build
        run: dotnet build LiteBus.slnx --configuration Release --no-restore

      - name: Docker Info
        run: docker info

      - name: Test
        run: dotnet test LiteBus.slnx --no-restore --verbosity normal --collect:"XPlat Code Coverage"

      - name: Benchmark Smoke
        run: dotnet run --configuration Release --no-build --project benchmarks/LiteBus.Benchmarks/LiteBus.Benchmarks.csproj -- --filter '*' --job Dry

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/**/*.xml'

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}